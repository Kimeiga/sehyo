<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<title>Sehyo — the most human social media on earth™</title>

		<!-- Per-page description is rendered dynamically by +layout.svelte;
		     no static fallback here so the home page can't end up with
		     two competing description tags. -->
		<meta name="theme-color" content="#00A5D8" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="canonical" href="https://sehyo.com/" />
		<link rel="icon" type="image/svg+xml" href="/sehyo-logo.svg" />
		<link rel="alternate icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/pwa-192x192.png" />

		<!-- iOS / standards-track Meta Tags -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Sehyo" />

<!-- OG / Twitter / canonical: rendered per-route via +layout.svelte. -->

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=M+PLUS+2:wght@700&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

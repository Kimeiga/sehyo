name = "sehyo"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "sehyo-db"
database_id = "5effc8ea-6563-45ee-a7d7-ef4b950fd7e8"

# R2 Bucket binding for image uploads
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "sehyo-images"

# KV namespace for sessions (optional, can use D1 instead)
# KV namespace for sessions
[[kv_namespaces]]
binding = "SESSIONS"
id = "bc491214935341a9b88984146caebddb"

[vars]
# Public environment variables
PUBLIC_APP_NAME = "Sehyo"

